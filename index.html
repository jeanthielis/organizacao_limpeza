<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlPoint</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb', secondary: '#475569', success: '#10b981', danger: '#ef4444',
                        darkbg: '#0f172a', darkcard: '#1e293b'
                    }
                }
            }
        }
    </script>
    
    <style>
        [v-cloak] { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        body, div, nav, aside { transition: background-color 0.3s, color 0.3s; }
        .page-break { page-break-before: always; }
        
        /* ===== LOADING SPLASH SCREEN ===== */
        .loading-splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 9999;
            animation: fadeOut 0.8s ease-out 2.5s forwards;
        }
        
        @keyframes fadeOut {
            from {
                opacity: 1;
                visibility: visible;
            }
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
        
        .loading-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        .loading-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: bounce 2s ease-in-out infinite;
        }
        
        .loading-logo i {
            font-size: 48px;
            color: #667eea;
        }
        
        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loading-text {
            color: white;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .loading-subtext {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-top: 8px;
        }
        
        /* ===== NOVO DESIGN PREMIUM ===== */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        .premium-section {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        .team-card-premium {
            background: white;
            border-radius: 24px;
            margin-bottom: 24px;
            box-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
            overflow: visible;
            position: relative;
            page-break-inside: avoid;
            break-inside: avoid;
        }
        
        .dark .team-card-premium {
            background: #1e293b;
        }
        
        .team-card-premium::before {
            content: '';
            position: relative;
            display: block;
            height: 6px;
            background: linear-gradient(135deg, #4318FF 0%, #3911D9 100%);
            border-radius: 24px 24px 0 0;
            margin-bottom: 0;
        }
        
        .card-top-premium {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #E9EDF7;
            gap: 16px;
            position: relative;
            z-index: 1;
        }
        
        .dark .card-top-premium {
            border-bottom-color: #334155;
        }
        
        .team-name-premium {
            font-size: 18px;
            font-weight: 800;
            color: #2B3674;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            min-width: 0;
        }
        
        .dark .team-name-premium {
            color: #F1F5F9;
        }
        
        .status-value-premium {
            font-size: 28px;
            font-weight: 800;
            color: #4318FF;
            line-height: 1.2;
            letter-spacing: -1px;
            text-align: right;
            flex-shrink: 0;
        }
        
        .status-badge-premium {
            background: #05CD99;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0px 4px 10px rgba(5, 205, 153, 0.3);
            margin-top: 6px;
            flex-shrink: 0;
            white-space: nowrap;
        }
        
        .card-body-premium {
            padding: 20px 24px;
            position: relative;
            z-index: 1;
        }
        
        .data-grid-premium {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }
        
        @media (min-width: 480px) {
            .data-grid-premium {
                flex-direction: row;
                align-items: flex-start;
                gap: 20px;
            }
        }
        
        .chart-wrapper-premium {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            filter: drop-shadow(0px 4px 12px rgba(5, 205, 153, 0.2));
        }
        
        .stats-wrapper-premium {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            min-width: 0;
        }
        
        .stat-box-premium {
            background: #F4F7FE;
            padding: 10px 14px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }
        
        .dark .stat-box-premium {
            background: #0F172A;
        }
        
        .stat-box-premium.success-box {
            background: #E6FAF5;
            border: 1px solid rgba(5, 205, 153, 0.2);
        }
        
        .stat-label-premium {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #A3AED0;
            flex-shrink: 1;
            min-width: 0;
        }
        
        .success-box .stat-label-premium {
            color: #05CD99;
        }
        
        .stat-value-premium {
            font-size: 16px;
            font-weight: 800;
            color: #2B3674;
            flex-shrink: 0;
        }
        
        .dark .stat-value-premium {
            color: #F1F5F9;
        }
        
        .success-box .stat-value-premium {
            color: #05CD99;
        }
        
        .issues-section-premium {
            background: #F8FAFC;
            border-radius: 12px;
            padding: 14px;
            border: 1px dashed #E9EDF7;
            position: relative;
            z-index: 1;
        }
        
        .dark .issues-section-premium {
            background: #0F172A;
            border-color: #334155;
        }
        
        .perfect-score-banner-premium {
            background: linear-gradient(135deg, #05CD99 0%, #04A67B 100%);
            border-radius: 10px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            box-shadow: 0px 6px 16px rgba(5, 205, 153, 0.25);
            position: relative;
            z-index: 1;
        }
        
        .perfect-icon-premium {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .card-footer-premium {
            background: #0B1437;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 0 0 24px 24px;
            position: relative;
            z-index: 1;
            gap: 10px;
        }
        
        .footer-text-premium {
            color: white;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 1;
            min-width: 0;
        }
        
        .goal-badge-premium {
            background: rgba(255,255,255,0.15);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            white-space: nowrap;
        }
        
        /* ===== PRINT STYLES ===== */
        @media print {
            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            
            .premium-section {
                margin: 0 !important;
            }
            
            .team-card-premium {
                box-shadow: none !important;
                border: 1px solid #E9EDF7;
                margin-bottom: 20px !important;
                page-break-inside: avoid;
                break-inside: avoid;
                overflow: visible !important;
            }
            
            .card-top-premium,
            .card-body-premium,
            .card-footer-premium {
                page-break-inside: avoid;
                break-inside: avoid;
            }
            
            .chart-wrapper-premium {
                filter: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
            
            canvas {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
            
            .dark .team-card-premium {
                background: white !important;
                color: #2B3674 !important;
            }
            
            .dark .card-top-premium {
                border-bottom-color: #E9EDF7 !important;
            }
            
            .dark .team-name-premium {
                color: #2B3674 !important;
            }
            
            .dark .stat-box-premium {
                background: #F4F7FE !important;
                color: #2B3674 !important;
            }
            
            .dark .stat-value-premium {
                color: #2B3674 !important;
            }
            
            .dark .issues-section-premium {
                background: #F8FAFC !important;
                border-color: #E9EDF7 !important;
                color: #2B3674 !important;
            }
            
            @page {
                margin: 10mm;
                size: auto;
            }
        }
        
        /* ===== OTIMIZAÇÃO MOBILE ===== */
        @media (max-width: 640px) {
            .team-card-premium {
                margin-bottom: 16px;
                box-shadow: 0px 4px 12px rgba(112, 144, 176, 0.08);
            }
            
            .card-top-premium {
                padding: 16px 16px;
                flex-wrap: wrap;
            }
            
            .card-body-premium {
                padding: 16px 16px;
            }
            
            .card-footer-premium {
                padding: 10px 16px;
                font-size: 11px;
            }
            
            .team-name-premium {
                font-size: 16px;
            }
            
            .status-value-premium {
                font-size: 24px;
            }
            
            .chart-wrapper-premium {
                width: 110px;
                height: 110px;
            }
            
            .perfect-score-banner-premium {
                padding: 12px;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-darkbg dark:text-slate-200 transition-colors duration-300">

    <div id="app" v-cloak class="min-h-screen flex flex-col md:flex-row">

        <!-- ===== LOADING SPLASH SCREEN ===== -->
        <div class="loading-splash" id="loadingSplash">
            <div class="loading-content">
                <div class="loading-logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="loading-spinner"></div>
                <div>
                    <div class="loading-text">ControlPoint</div>
                    <div class="loading-subtext">Carregando aplicação...</div>
                </div>
            </div>
        </div>

        <!-- 🔔 CONTAINER DE NOTIFICAÇÕES -->
        <div class="fixed top-4 right-4 z-[9999] space-y-2 pointer-events-none">
            <transition-group name="toast" tag="div">
                <div v-for="notification in notifications" :key="notification.id"
                    class="pointer-events-auto px-4 py-3 rounded-lg shadow-lg backdrop-blur-sm border animate-slide-in"
                    :class="{
                        'bg-green-50 dark:bg-green-900/30 border-green-200 dark:border-green-700 text-green-800 dark:text-green-200': notification.type === 'success',
                        'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-700 text-red-800 dark:text-red-200': notification.type === 'error',
                        'bg-yellow-50 dark:bg-yellow-900/30 border-yellow-200 dark:border-yellow-700 text-yellow-800 dark:text-yellow-200': notification.type === 'warning',
                        'bg-blue-50 dark:bg-blue-900/30 border-blue-200 dark:border-blue-700 text-blue-800 dark:text-blue-200': notification.type === 'info'
                    }">
                    <div class="flex items-center gap-3">
                        <i :class="{
                            'fas fa-check-circle text-green-500': notification.type === 'success',
                            'fas fa-exclamation-circle text-red-500': notification.type === 'error',
                            'fas fa-exclamation-triangle text-yellow-500': notification.type === 'warning',
                            'fas fa-info-circle text-blue-500': notification.type === 'info'
                        }" class="text-lg flex-shrink-0"></i>
                        <span class="font-medium flex-1">{{ notification.message }}</span>
                        <button @click="removeNotification(notification.id)" class="text-sm opacity-60 hover:opacity-100">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
            </transition-group>
        </div>

        <style>
            .toast-enter-active, .toast-leave-active { transition: all 0.3s ease; }
            .toast-enter-from { transform: translateX(400px); opacity: 0; }
            .toast-leave-to { transform: translateX(400px); opacity: 0; }
            @keyframes slide-in {
                from { transform: translateX(400px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            .animate-slide-in { animation: slide-in 0.3s ease; }
        </style>

        <div v-if="!user" class="fixed inset-0 z-50 bg-white dark:bg-darkbg flex items-center justify-center p-4">
             <div class="w-full max-w-md">
                <div class="text-center mb-8">
                    <i class="fas fa-chart-line text-5xl text-primary mb-4"></i>
                    <h2 class="text-3xl font-bold text-slate-900 dark:text-white">ControlPoint</h2>
                </div>
                <div class="bg-white dark:bg-darkcard p-8 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700">
                    <div class="flex border-b border-slate-200 dark:border-slate-600 mb-6">
                        <button @click="authMode = 'login'" :class="authMode === 'login' ? 'text-primary border-primary' : 'border-transparent text-slate-500'" class="flex-1 pb-2 font-medium border-b-2">Login</button>
                        <button @click="authMode = 'register'" :class="authMode === 'register' ? 'text-primary border-primary' : 'border-transparent text-slate-500'" class="flex-1 pb-2 font-medium border-b-2">Cadastrar</button>
                    </div>
                    <form @submit.prevent="handleAuth" class="space-y-4">
                        <input v-model="authForm.email" type="email" placeholder="Email" required class="w-full px-4 py-3 rounded-lg border dark:bg-slate-700 dark:border-slate-600 outline-none focus:ring-2 focus:ring-primary">
                        <input v-model="authForm.password" type="password" placeholder="Senha" required class="w-full px-4 py-3 rounded-lg border dark:bg-slate-700 dark:border-slate-600 outline-none focus:ring-2 focus:ring-primary">
                        <div v-if="authError" class="p-3 bg-red-50 text-red-600 rounded-lg text-sm">{{ authError }}</div>
                        <button type="submit" :disabled="loading" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-blue-600 disabled:opacity-50">
                            <i v-if="loading" class="fas fa-spinner fa-spin mr-2"></i> {{ authMode === 'login' ? 'Entrar' : 'Criar Conta' }}
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <template v-else>
            <aside class="hidden md:flex flex-col w-64 bg-white dark:bg-darkcard border-r border-slate-200 dark:border-slate-700 h-screen fixed top-0 left-0 z-20">
                <div class="p-6 border-b border-slate-100 dark:border-slate-700">
                    <h1 class="text-2xl font-bold text-primary flex items-center gap-2"><i class="fas fa-chart-line"></i> ControlPoint</h1>
                    <p class="text-xs text-slate-500 mt-1 truncate">{{ user.email }}</p>
                </div>
                <nav class="flex-1 p-4 space-y-2">
                    <button v-for="item in menuItems" :key="item.id" @click="currentView = item.id"
                        :class="currentView === item.id ? 'bg-blue-50 dark:bg-blue-900/30 text-primary' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700'"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg font-medium text-left">
                        <i :class="item.icon" class="w-6 text-center"></i> {{ item.label }}
                    </button>
                </nav>
                <div class="px-4 pb-2 space-y-2">
                    <button @click="toggleDarkMode" class="w-full flex items-center gap-3 px-4 py-3 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg font-medium">
                        <i :class="isDarkMode ? 'fas fa-sun text-yellow-400' : 'fas fa-moon'"></i> {{ isDarkMode ? 'Claro' : 'Escuro' }}
                    </button>
                    
                    <!-- Versão da Aplicação -->
                    <div class="px-4 py-3 text-center">
                        <div class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1">
                            <i class="fas fa-code-branch mr-1"></i> Versão
                        </div>
                        <div class="text-sm font-bold text-primary">{{ appVersion }}</div>
                        <div class="text-xs text-slate-400 dark:text-slate-500">{{ versionStatus }}</div>
                    </div>
                </div>
                <div class="p-4 border-t border-slate-100 dark:border-slate-700">
                    <button @click="logout" class="w-full flex items-center gap-3 px-4 py-3 text-danger hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium"><i class="fas fa-sign-out-alt w-6"></i> Sair</button>
                </div>
            </aside>

            <main class="flex-1 md:ml-64 min-h-screen pb-24 md:pb-8 bg-slate-50 dark:bg-darkbg">
                <header class="md:hidden bg-white dark:bg-darkcard p-4 shadow-sm sticky top-0 z-10 flex justify-between items-center border-b dark:border-slate-700">
                    <h1 class="text-xl font-bold text-primary">CP</h1>
                    <div class="flex gap-3">
                        <button @click="toggleDarkMode"><i :class="isDarkMode ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-slate-400'"></i></button>
                        <button @click="logout" class="text-slate-400"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </header>

                <div class="p-4 md:p-8 max-w-5xl mx-auto">
                    
                    <div v-if="currentView === 'inspection'" class="space-y-6">
                        <div class="bg-white dark:bg-darkcard p-5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
                            <div class="flex flex-col md:flex-row justify-between gap-4 mb-6">
                                <div>
                                    <h2 class="text-xl font-bold text-slate-800 dark:text-white">Verificação</h2>
                                    <p class="text-sm text-slate-500">Selecione equipe e data (Edição automática se já existir)</p>
                                </div>
                                <div class="flex gap-2">
                                    <select v-model="currentTeam" class="bg-slate-50 dark:bg-slate-700 dark:text-white border dark:border-slate-600 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-primary"><option>Equipe 1</option><option>Equipe 2</option><option>Equipe 3</option><option>Equipe 4</option></select>
                                    <input type="date" v-model="currentDate" class="bg-slate-50 dark:bg-slate-700 dark:text-white border dark:border-slate-600 rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-primary">
                                </div>
                            </div>
                            <div class="relative pt-1 mb-4">
                                <div class="flex mb-2 justify-between"><span class="text-xs font-semibold bg-blue-100 text-primary px-2 py-1 rounded">Progresso</span><span class="text-xs font-semibold dark:text-white">{{ progress.toFixed(0) }}% / {{ meta }}%</span></div>
                                <div class="overflow-hidden h-4 text-xs flex rounded bg-slate-100 dark:bg-slate-700"><div :style="{ width: progress + '%' }" :class="progress >= meta ? 'bg-success' : 'bg-primary'" class="flex flex-col justify-center transition-all duration-500"></div></div>
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Resumo Geral</label>
                                <textarea v-model="inspectionObservation" rows="1" placeholder="Observações gerais da inspeção..." class="w-full p-3 bg-slate-50 dark:bg-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:ring-2 focus:ring-primary text-sm"></textarea>
                            </div>
                        </div>

                        <div class="flex justify-end">
                            <button @click="toggleAllPoints" class="text-sm font-medium flex items-center gap-2 px-3 py-2 rounded-lg transition-colors" :class="allSelected ? 'text-danger hover:bg-red-50' : 'text-primary hover:bg-blue-50'">
                                <i :class="allSelected ? 'fas fa-square-minus' : 'fas fa-check-double'"></i> {{ allSelected ? 'Desmarcar Todos' : 'Marcar Todos' }}
                            </button>
                        </div>

                        <div v-if="loadingPoints" class="text-center py-10"><i class="fas fa-circle-notch fa-spin text-3xl text-primary"></i></div>
                        
                        <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                            <div v-for="point in points" :key="point.id" 
                                class="bg-white dark:bg-darkcard p-4 rounded-xl border-2 transition-all shadow-sm"
                                :class="point.checked ? 'border-primary bg-blue-50 dark:bg-blue-900/10' : 'border-transparent dark:border-slate-700'">
                                
                                <div class="flex items-center justify-between mb-2">
                                    <div class="flex items-center gap-3 cursor-pointer flex-1" @click="togglePoint(point)">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => console.log('Service Worker registado:', reg.scope))
            .catch((err) => console.log('Falha no Service Worker:', err));
        });
      }
    </script>

    <!-- ===== REMOVER LOADING QUANDO PÁGINA CARREGAR ===== -->
    <script>
        // Remover loading splash screen quando página estiver pronta
        window.addEventListener('load', () => {
            const splash = document.getElementById('loadingSplash');
            if (splash) {
                setTimeout(() => {
                    splash.style.animation = 'fadeOut 0.8s ease-out forwards';
                }, 1500); // Mostra por 1.5s depois começa a sair
            }
        });
        
        // Fallback: remover após 5 segundos de qualquer forma
        setTimeout(() => {
            const splash = document.getElementById('loadingSplash');
            if (splash) {
                splash.style.display = 'none';
            }
        }, 5000);
    </script>
